# Docker Compose Spec Version
version: '2'

services:
  roscore:
    image: usdotfhwastoldev/carma-base:develop-noetic
    networks:
      carma_net:
        ipv4_address: 172.3.0.2
    container_name: roscore
    volumes_from:
      - container:carma-config:ro
    environment:
      - ROS_IP=172.3.0.2
      - ROS_MASTER_URI=http://172.3.0.2:11311/
    volumes:
      - /opt/carma/.ros:/home/carma/.ros
      - /opt/carma/logs:/opt/carma/logs
    restart: always
    command: roscore

  platform:
    image: usdotfhwastoldev/carma-platform:develop-ped-publisher
    networks:
      carma_net:
        ipv4_address: 172.3.0.4
    container_name: platform
    volumes_from:
      - container:carma-config:ro
    volumes:
      - /opt/carma/logs:/opt/carma/logs
      - /opt/carma/.ros:/home/carma/.ros
      - /opt/carma/vehicle/calibration:/opt/carma/vehicle/calibration
      - /opt/carma/maps:/opt/carma/maps
      - /opt/carma/routes:/opt/carma/routes
      - /opt/carma/yolo:/opt/carma/yolo
      - ~/carma_ws/src/carma-platform/motion_computation/config:/opt/carma/install/motion_computation/share/motion_computation/config
    command: bash -c 'export RMW_IMPLEMENTATION=rmw_fastrtps_cpp &&
      source /opt/carma/install/setup.bash &&
      ros2 launch /opt/carma/vehicle/config/carma_docker.launch.py'

  pedestrian_publisher:
    image: usdotfhwastoldev/carma-platform:develop-ped-publisher
    networks:
      carma_net:
        ipv4_address: 172.3.0.9
    container_name: pedestrian_publisher
    volumes_from:
      - container:carma-config:ro
    volumes:
      - /opt/carma/logs:/opt/carma/logs
      - /opt/carma/.ros:/home/carma/.ros
      - /opt/carma/vehicle/calibration:/opt/carma/vehicle/calibration
      - /opt/carma/maps:/opt/carma/maps
      - /opt/carma/routes:/opt/carma/routes
      - /opt/carma/yolo:/opt/carma/yolo
      - /home/carma/carma_ws/src/carma-developer-tools/pedestrian_publisher/config/pedestrian_params.yaml:/home/carma/workspace/install/pedestrian_publisher/share/pedestrian_publisher/config/pedestrian_params.yaml
      - /home/carma/carma_ws/src/carma-developer-tools/pedestrian_publisher/launch/pedestrian_publisher_launch.py:/home/carma/workspace/install/pedestrian_publisher/share/pedestrian_publisher/launch/pedestrian_publisher_launch.py
      - /home/carma/carma_ws/src/carma-developer-tools/pedestrian_publisher/pedestrian_publisher/pedestrian_publisher.py:/home/carma/workspace/install/pedestrian_publisher/lib/python3.10/site-packages/pedestrian_publisher/pedestrian_publisher.py
    command: bash -c 'export RMW_IMPLEMENTATION=rmw_fastrtps_cpp &&
      source /opt/carma/install/setup.bash && source /home/carma/workspace/install/setup.bash &&
      ros2 launch pedestrian_publisher pedestrian_publisher_launch.py'

  ros1_bridge:
    image: usdotfhwastoldev/carma-msgs:develop
    networks:
      carma_net:
        ipv4_address: 172.3.0.5
    container_name: ros1_bridge
    volumes_from:
      - container:carma-config:ro
    environment:
      - ROS_IP=172.3.0.5
      - ROS_MASTER_URI=http://172.3.0.2:11311/
    volumes:
      - /opt/carma/logs:/opt/carma/logs
      - /opt/carma/.ros:/home/carma/.ros
      - /opt/carma/vehicle/calibration:/opt/carma/vehicle/calibration
      - /opt/carma/maps:/opt/carma/maps
      - /opt/carma/routes:/opt/carma/routes
      - /opt/carma/yolo:/opt/carma/yolo
    command: bash -c 'export RMW_IMPLEMENTATION=rmw_fastrtps_cpp &&
      wait-for-it 172.3.0.2:11311 -- rosparam load /opt/carma/vehicle/config/bridge.yml &&
      source /home/carma/.base-image/workspace/install/setup.bash &&
      ros2 run ros1_bridge dynamic_bridge --multi-threads __log_disable_rosout:=true'

  carma-carla-integration:
    image: usdotfhwastoldev/carma-carla-integration:develop
    networks:
      carma_net:
        ipv4_address: 172.3.0.6
    container_name: carma-carla-integration
    volumes_from:
      - container:carma-config:ro
    environment:
      - ROS_IP=172.3.0.6
      - ROS_MASTER_URI=http://172.3.0.2:11311/
      - PYTHONUNBUFFERED=1
    # sleep is for carla simulator to become available & carma node lifecycles to get activated
    # start_delay_in_seconds is carla game time seconds to adjust when to engage for the scenario
    # and account for delay required for world model to fully update after route is selected
    # be sure to change host IP to host machines IP if starting CARLA from host
    command: >
      bash -c "sleep 10
      && wait-for-it 172.3.0.2:11311
      && export PYTHONPATH=$PYTHONPATH:~/PythonAPI/carla/dist/carla-0.9.10-py3.7-linux-x86_64.egg:/home/carma/carla-sensor-lib/src
      && source ~/carma_carla_ws/devel/setup.bash
      && roslaunch carma_carla_agent carma_carla_agent.launch
      role_name:='carma_1'
      selected_route:=${ROUTE}
      enable_sensor_objects:='true'
      town:='TFHRC'
      host:=${CARLA_HOST_IP}
      port:='2000'
      start_delay_in_seconds:=${START_DELAY_IN_SECONDS}
      spawn_point:=${SPAWN_POINT}
      synchronous_mode:='true'"

networks:

  carma_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.3.0.0/16