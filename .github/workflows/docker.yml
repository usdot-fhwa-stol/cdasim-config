name: Docker build

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build carla_ground_truth_integration
        uses: docker/build-push-action@v5
        with:
          context: ./carla_ground_truth_integration/
          push: false

      - name: Build development
        uses: docker/build-push-action@v5
        with:
          context: ./development/
          push: false

      - name: Build xil-Town04
        uses: docker/build-push-action@v5
        with:
          context: ./xil-Town04/
          push: false

      - name: Build xil-Town05
        uses: docker/build-push-action@v5
        with:
          context: ./xil-Town05/
          push: false

      - name: Build xil_carma_basic_lanefollow_scenario
        uses: docker/build-push-action@v5
        with:
          context: ./xil_carma_basic_lanefollow_scenario/
          push: false

      - name: Build xil_carma_cloud
        uses: docker/build-push-action@v5
        with:
          context: ./xil_carma_cloud/
          push: false

      - name: Build xil_carma_messenger
        uses: docker/build-push-action@v5
        with:
          context: ./xil_carma_messenger/
          push: false

      - name: Build xil_carma_training
        uses: docker/build-push-action@v5
        with:
          context: ./xil_carma_training/
          push: false

      - name: Build xil_cloud_telematics
        uses: docker/build-push-action@v5
        with:
          context: ./xil_cloud_telematics/
          push: false

      - name: Build xil_vru_uc1_scenario
        uses: docker/build-push-action@v5
        with:
          context: ./xil_vru_uc1_scenario/
          push: false
